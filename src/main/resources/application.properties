# ================== DataSource ==================
spring.datasource.url=jdbc:mysql://localhost:3306/jobdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
# V?i Spring Boot 3+, kh¶ng b?t bu?c, nh?ng khai bßo c?ng kh¶ng sao:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================== JPA / Hibernate ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Log cŌu SQL + giß tr? bind (Hibernate 6)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ================== App settings (JWT) ==================
app.jwt.secret=change-this-to-a-long-random-32-bytes-min-key
app.jwt.expirationMs=86400000

# (tu? ch?n)
server.port=8080
